{% load proposal_extras %}
<div class="feat-g">
  {% for mod in modules %}
  <div class="feat-c" style="border-color:{{ mod.color }}33;background:{{ mod.color }}08;">
    <div class="feat-top" style="background:{{ mod.color }};"></div>
    <div class="feat-num" style="color:{{ mod.color }};">MODULE {{ forloop.counter|stringformat:"02d" }}</div>
    <span class="feat-icon">{{ mod.icon }}</span>
    <div class="feat-title">
      {{ mod.name }}
      {% if mod.tag %}<span class="mod-tag">{{ mod.tag }}</span>{% endif %}
    </div>
    <div class="feat-desc">{{ mod.short_desc }}</div>
  </div>
  {% endfor %}
</div>
